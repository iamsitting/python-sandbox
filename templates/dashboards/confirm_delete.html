{% extends 'base.html' %}

{% block title %}Delete Dashboard | Information Systems Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <p class="text-uppercase text-secondary fw-semibold mb-1">Confirm deletion</p>
                <h1 class="h3 mb-3">Delete {{ object.name }}</h1>
                <p class="text-secondary">This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2 mt-4">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Delete</button>
                    <a class="btn btn-outline-secondary" href="{% url 'dashboards:detail' object.pk %}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
